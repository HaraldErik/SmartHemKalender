<!doctype html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Hem Kalender</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="script.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4 sm:p-8 selection:bg-brand-500 selection:text-white">

    <main class="w-full max-w-5xl glass-panel rounded-3xl shadow-2xl shadow-brand-500/10 overflow-hidden flex flex-col md:flex-row transition-all duration-300">
        
        <!-- Left Sidebar: Info & Smart Home Hub -->
        <aside class="w-full md:w-80 bg-brand-600 text-white p-8 flex flex-col relative overflow-hidden shrink-0">
            <!-- Decorative background blob -->
            <div class="absolute -top-24 -left-24 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-brand-900/20 rounded-full blur-3xl"></div>

            <div class="relative z-10 flex-1">
                <div class="flex items-center gap-2 mb-10 opacity-90">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-sm font-medium tracking-wide uppercase">Smart Hem</span>
                </div>

                <div class="mb-8">
                    <h2 id="clockTime" class="text-5xl font-bold tracking-tight mb-2">--:--</h2>
                    <p id="sidebarDateStr" class="text-brand-100 font-medium text-lg"></p>
                </div>

                <div class="space-y-6">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-brand-200 border-b border-brand-500/50 pb-2">Kommande Händelser</h3>
                    
                    <div id="eventsList" class="space-y-4 custom-scrollbar overflow-y-auto max-h-64 pr-2">
                        <!-- Events populated by JS -->
                    </div>
                </div>
            </div>

            <div class="relative z-10 mt-8 pt-6 border-t border-brand-500/50 flex justify-between items-center text-sm">
                <div class="flex items-center gap-2 text-brand-100">
                    <i data-lucide="thermometer" class="w-4 h-4"></i>
                    <span>22°C Inne</span>
                </div>
                <div class="flex items-center gap-2 text-brand-100">
                    <i data-lucide="cloud-sun" class="w-4 h-4"></i>
                    <span>14°C Ute</span>
                </div>
            </div>
        </aside>

        <!-- Right Side: Calendar Grid -->
        <section class="flex-1 p-6 sm:p-10 bg-white/60">
            <!-- Header Controls -->
            <header class="flex items-center justify-between mb-8">
                <div>
                    <h1 id="monthYearDisplay" class="text-2xl sm:text-3xl font-bold text-slate-800 capitalize"></h1>
                    <p class="text-sm text-slate-500 mt-1">Välj ett datum för att se schema</p>
                </div>
                
                <div class="flex items-center gap-2 sm:gap-4">
                    <button onclick="goToToday()" class="hidden sm:block px-4 py-2 text-sm font-medium text-brand-600 bg-brand-50 hover:bg-brand-100 rounded-lg transition-colors">
                        Idag
                    </button>
                    <div class="flex items-center bg-slate-100 rounded-lg p-1">
                        <button onclick="changeMonth(-1)" class="p-2 text-slate-600 hover:text-brand-600 hover:bg-white rounded-md transition-all focus:outline-none focus:ring-2 focus:ring-brand-500">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>
                        <button onclick="changeMonth(1)" class="p-2 text-slate-600 hover:text-brand-600 hover:bg-white rounded-md transition-all focus:outline-none focus:ring-2 focus:ring-brand-500">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Calendar Grid -->
            <div class="grid grid-cols-7 gap-1 sm:gap-2 mb-2">
                <!-- Days of week -->
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider text-center py-2">Mån</div>
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider text-center py-2">Tis</div>
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider text-center py-2">Ons</div>
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider text-center py-2">Tor</div>
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider text-center py-2">Fre</div>
                <div class="text-xs font-semibold text-brand-500 uppercase tracking-wider text-center py-2">Lör</div>
                <div class="text-xs font-semibold text-brand-500 uppercase tracking-wider text-center py-2">Sön</div>
            </div>

            <div id="calendarGrid" class="grid grid-cols-7 gap-1 sm:gap-2 auto-rows-fr">
                <!-- Days populated by JS -->
            </div>
        </section>
    </main>

</body>
</html>
